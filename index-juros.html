<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ProCalc | Juros Compostos</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="CSS/style-calcula.css">
    <link rel="stylesheet" href="CSS/header-calcula.css">
    <link rel="stylesheet" href="CSS/home-calcula.css">
</head>

<body>

    <header class="calc-header">
        <div class="logo">
            <h1><i class="fa-solid fa-microchip"></i> ProCalc</h1>
        </div>
        <nav class="nav-tools">
            <ul>
                <li>
                    <a href="index.html">
                        <i class="fa-solid fa-calculator"></i> <span>Calculadora</span>
                    </a>
                </li>
                <li>
                    <a href="index-moeda.html">
                        <i class="fa-solid fa-comments-dollar"></i> <span>Moedas</span>
                    </a>
                </li>
                <li>
                    <a href="index-juros.html" class="active">
                        <i class="fa-solid fa-chart-line"></i> <span>Juros</span>
                    </a>
                </li>
                <li>
                    <a href="index-medidas.html">
                        <i class="fa-solid fa-ruler-combined"></i> <span>Medidas</span>
                    </a>
                </li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <div class="dashboard">
            <div class="calculadora">
                <div class="display">
                    <div id="infoJuros" class="display-upper">Resultado da Simulação</div>
                    <div id="resultadoJuros" class="display-main">R$ 0,00</div>
                </div>

                <div class="card-util" style="background: transparent; border: none; box-shadow: none;">
                    <div class="input-group" style="margin-bottom: 15px;">
                        <label style="color: #888; display: block; margin-bottom: 5px;">Capital Inicial (R$):</label>
                        <input type="number" id="capital" placeholder="Ex: 1000"
                            style="width: 100%; padding: 12px; border-radius: 8px; background: #121212; border: 1px solid #333; color: #fff; outline: none;">
                    </div>

                    <div class="input-group" style="margin-bottom: 15px;">
                        <label style="color: #888; display: block; margin-bottom: 5px;">Taxa de Juros (% ao
                            mês):</label>
                        <input type="number" id="taxa" placeholder="Ex: 1"
                            style="width: 100%; padding: 12px; border-radius: 8px; background: #121212; border: 1px solid #333; color: #fff; outline: none;">
                    </div>

                    <div class="input-group" style="margin-bottom: 25px;">
                        <label style="color: #888; display: block; margin-bottom: 5px;">Tempo (meses):</label>
                        <input type="number" id="tempo" placeholder="Ex: 12"
                            style="width: 100%; padding: 12px; border-radius: 8px; background: #121212; border: 1px solid #333; color: #fff; outline: none;">
                    </div>

                    <button onclick="calcularJuros()" class="btn-equal"
                        style="width: 100%; height: 55px; font-size: 1.1rem;">
                        <i class="fa-solid fa-magnifying-glass-chart"></i> Calcular
                    </button>
                </div>
            </div>

            <aside class="sidebar">
                <div class="card-util animate-in">
                    <h3><i class="fa-solid fa-chart-pie"></i> Detalhamento</h3>
                    <div id="detalhesJuros" style="font-size: 0.9rem; color: #aaa; line-height: 1.8;">
                        Aguardando cálculo...
                    </div>
                </div>

                <div class="card-util animate-in" style="animation-delay: 0.2s;">
                    <h3><i class="fa-solid fa-history"></i> Histórico</h3>
                    <ul id="listaHistoricoJuros"></ul>
                    <button onclick="limparHistoricoJuros()" class="btn-util-red">
                        <i class="fa-solid fa-trash-can"></i> Limpar
                    </button>
                </div>
            </aside>
        </div>
    </main>

    <footer class="calc-footer">
        <div class="footer-content">
            <p>Desenvolvido com <i class="fa-solid fa-heart pulse"></i> por <strong>Rafaela Syang</strong></p>

            <div class="social-links">
                <a href="https://github.com/rafasyang7-cell" target="_blank" title="GitHub">
                    <i class="fa-brands fa-github"></i>
                </a>
                <a href="https://www.linkedin.com/in/rafaela-syang-80185b272/" target="_blank" title="LinkedIn">
                    <i class="fa-brands fa-linkedin"></i>
                </a>
                <a href="mailto:rafasyang7@gmail.com" title="E-mail">
                    <i class="fa-solid fa-envelope"></i>
                </a>
            </div>
        </div>
    </footer>
    <script src="js/script-juros.js"></script>
</body>

</html>
